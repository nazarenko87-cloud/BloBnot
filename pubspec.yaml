name: blobnot
description: "BloBnot — local-first Markdown notes with wiki-links and graph."
publish_to: 'none'
version: 1.3.0+13

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  flutter_markdown: ^0.7.4
  markdown: ^7.2.2
  pdf: ^3.11.1
  path: ^1.9.0
  file_selector: ^1.0.3
  crypto: ^3.0.5
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/icon.png
    - assets/stickers/
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf
